{% extends "base.html" %}
{% block title %}Мои конфиги{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Мои конфиги</h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addConfigModal">Новый конфиг</button>
</div>

<div id="action-alert"></div>
<div id="configs-list">{% include "configs/_list.html" %}</div>

<div class="modal fade" id="addConfigModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form hx-post="/my-configs/add" hx-target="#configs-list" hx-on::after-request="if(event.detail.successful && !event.detail.xhr.getResponseHeader('X-Action-Error')) bootstrap.Modal.getInstance(document.getElementById('addConfigModal')).hide()">
        <div class="modal-header"><h5 class="modal-title">Новый конфиг</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="mb-2"><label class="form-label">Тип устройства</label>
                <select class="form-select" name="device_type">
                    <option value="PC">ПК</option>
                    <option value="PHONE">Телефон</option>
                    <option value="ROUTER">Роутер</option>
                </select>
            </div>
            <div class="mb-2"><label class="form-label">Метка</label><input class="form-control" name="label" placeholder="Ноутбук" required></div>
        </div>
        <div class="modal-footer"><button type="submit" class="btn btn-primary">Создать</button></div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
