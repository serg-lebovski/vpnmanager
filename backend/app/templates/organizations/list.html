{% extends "base.html" %}
{% block title %}Организации{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Организации</h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addOrgModal">Добавить организацию</button>
</div>

<div id="action-alert"></div>
<div id="orgs-table">{% include "organizations/_table.html" %}</div>

<div class="modal fade" id="addOrgModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form hx-post="/organizations/add" hx-target="#orgs-table" hx-on::after-request="if(event.detail.successful && !event.detail.xhr.getResponseHeader('X-Action-Error')) bootstrap.Modal.getInstance(document.getElementById('addOrgModal')).hide()">
        <div class="modal-header"><h5 class="modal-title">Новая организация</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="mb-2"><label class="form-label">Название</label><input class="form-control" name="name" required></div>
            <div class="mb-2"><label class="form-label">Авто-очистка неактивных конфигов (дней, опционально)</label><input class="form-control" name="auto_cleanup_days" type="number"></div>
        </div>
        <div class="modal-footer"><button type="submit" class="btn btn-primary">Создать</button></div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
