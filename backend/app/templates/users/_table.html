<table class="table">
    <thead><tr><th>Логин</th><th>ФИО</th><th>Роль</th><th>Организация</th><th>Конфигов</th><th>Действия</th></tr></thead>
    <tbody>
    {% for u, org_name in users %}
    <tr>
        <td>{{ u.username }}</td>
        <td>{{ u.full_name }}</td>
        <td>{{ u.role }}</td>
        <td>{{ org_name or "—" }}</td>
        <td>{{ u.configs_count }}</td>
        <td>
            <button class="btn btn-sm btn-outline-secondary" hx-post="/users/{{ u.id }}/reset-password" hx-target="#users-table" hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'>Сбросить пароль</button>
            <button class="btn btn-sm btn-outline-danger" hx-delete="/users/{{ u.id }}" hx-target="#users-table" hx-confirm="Удалить пользователя {{ u.username }}?" hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'>Удалить</button>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
